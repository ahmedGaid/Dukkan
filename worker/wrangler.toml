name = "dukkan-uploads"
main = "src/index.js"
compatibility_date = "2024-11-01"

# R2 bucket that stores uploaded images. Create it once before the first deploy:
#   wrangler r2 bucket create dukkan-images
[[r2_buckets]]
binding = "BUCKET"
bucket_name = "dukkan-images"

[vars]
# Firebase project — the Worker only accepts ID tokens minted for this project.
PROJECT_ID = "dukkan-93042"

# Public-read origin for the bucket. After you enable public access
# (R2 dashboard -> your bucket -> Settings -> Public access), paste the r2.dev
# URL here, or a custom domain. Example: https://pub-xxxxxxxx.r2.dev
PUBLIC_BASE_URL = "https://REPLACE-WITH-YOUR-R2-PUBLIC-URL"

# CORS. Lock to the app's origin in production; "*" is fine while testing.
ALLOWED_ORIGIN = "*"

# FIREBASE_SERVICE_ACCOUNT is a SECRET, not a var — it must never sit in this
# file (committed to git). Set it once via:
#   npx wrangler secret put FIREBASE_SERVICE_ACCOUNT
# pasting the full JSON key from Firebase console -> Project settings ->
# Service accounts -> Generate new private key. Used by POST /notify to mint
# an access token for Firestore reads + FCM v1 sends. See worker/README.md.
